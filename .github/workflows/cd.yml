name: CD

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify tag matches Gradle version
        run: |
          gradle_version=$(./gradlew properties -q --console=plain | awk '/^version:/ {print $2}')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$gradle_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Gradle version $gradle_version" >&2
            exit 1
          fi

      - name: Build and test
        run: ./gradlew build --stacktrace

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes plugin/build/libs/BlueMapStructuresPaper-*.jar

name: CD

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify tag matches Gradle version
        run: |
          gradle_version=$(./gradlew properties -q --console=plain | awk '/^version:/ {print $2}')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$gradle_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Gradle version $gradle_version" >&2
            exit 1
          fi

      - name: Build and test
        run: ./gradlew build --stacktrace

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --clobber plugin/build/libs/BlueMapStructuresPaper-*.jar
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes plugin/build/libs/BlueMapStructuresPaper-*.jar
          fi

      - name: Publish to Modrinth
        env:
          GH_TOKEN: ${{ github.token }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -z "$MODRINTH_TOKEN" ]; then
            echo "MODRINTH_TOKEN not set; skipping Modrinth publish"
            exit 0
          fi
          MODRINTH_CHANGELOG="$(gh release view "$GITHUB_REF_NAME" --json body -q .body)"
          export MODRINTH_CHANGELOG
          ./gradlew modrinth --stacktrace

# BluemapStructuresPaper configuration
# Changes apply after a server restart (or /reload of this plugin).

# Half-side, in blocks, of the square around world origin (0,0) that is scanned for
# structures. Bigger radius = quadratically more locate queries on first scan.
radius-blocks: 5000

scan:
  # Max milliseconds per server tick spent locating structures during the initial
  # scan. Lower = slower scan, less TPS impact. Range 1-45.
  budget-ms-per-tick: 20
  # Scan results are deterministic per (seed, radius, enabled layers); cache them in
  # plugins/BluemapStructuresPaper/cache/ and skip re-scanning on restart.
  cache-enabled: true

# Per-layer toggles. Each enabled layer becomes its own toggleable marker layer in the
# BlueMap sidebar.
layers:
  village: true
  desert_pyramid: true
  jungle_temple: true
  swamp_hut: true
  igloo: true
  pillager_outpost: true
  ancient_city: true
  trail_ruins: true
  trial_chambers: true
  ocean_ruin: true
  shipwreck: true
  ruined_portal: true
  monument: true
  mansion: true
  fortress: true
  bastion: true
  ruined_portal_nether: true
  end_city: true
  # Buried treasure spawns on a per-chunk grid: exhaustively enumerating it through
  # the locate API needs ~100k queries at radius 5000. Enable only with a small
  # radius, and expect the initial scan to take a while.
  buried_treasure: false
  stronghold: true

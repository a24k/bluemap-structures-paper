# BlueMapStructuresPaper configuration
# Structure positions are computed directly from the world seed (plus a biome check)
# in milliseconds at startup — there is no on-disk cache. Changes to this file apply
# on the next server restart (or /reload of this plugin), since the scan runs once
# per BlueMap enable.

# Search areas. A structure is shown if it falls inside ANY listed square (union;
# overlaps are deduplicated). Each entry takes:
#   center:        origin        — world origin (0,0)
#                  spawn         — the world's spawn point (resolved per world)
#                  {x: …, z: …}  — explicit block coordinates
#   radius-blocks: half-side of the square in blocks (256..1000000, default 5000)
areas:
  - center: origin
    radius-blocks: 5000

# Per-world overrides, keyed by world name. An override REPLACES the default 'areas'
# list entirely for that world. Stronghold rings stay anchored at (0,0) by vanilla
# definition — areas only filter which ring positions are shown.
#worlds:
#  world_the_end:
#    areas:
#      - center: origin
#        radius-blocks: 3000
#  resource:
#    areas:
#      - center: spawn
#        radius-blocks: 2000
#      - center: {x: -12000, z: 8000}
#        radius-blocks: 2000

# Legacy single-radius form — equivalent to one origin-centered area. Still honored,
# but ignored (with a warning) if 'areas' is also set.
#radius-blocks: 5000

# Per-layer toggles. Each enabled layer becomes its own toggleable marker layer in the
# BlueMap sidebar.
layers:
  village: true
  desert_pyramid: true
  jungle_temple: true
  swamp_hut: true
  igloo: true
  pillager_outpost: true
  ancient_city: true
  trail_ruins: true
  trial_chambers: true
  ocean_ruin: true
  shipwreck: true
  ruined_portal: true
  monument: true
  mansion: true
  fortress: true
  bastion: true
  ruined_portal_nether: true
  end_city: true
  # Buried treasure spawns on a per-chunk grid (~0.01 probability per chunk). Scanning
  # it is no longer a time cost — the cost is marker count: at radius 5000 this can
  # place thousands of markers, which can slow the BlueMap web app. It stays
  # zoom-gated when enabled; use smaller search areas if the web app feels sluggish.
  buried_treasure: false
  # Mineshafts spawn on a per-chunk roll (~0.004 probability per chunk). Like buried
  # treasure, scanning is cheap but marker count is not — at radius 5000 this can place
  # 1500+ markers, which can slow the BlueMap web app. Opt-in, and zoom-gated when
  # enabled; use smaller search areas if the web app feels sluggish.
  mineshaft: false
  stronghold: true
